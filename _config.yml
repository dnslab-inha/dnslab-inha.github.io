title: Distributed and Networked Systems Lab. (DNSLab) @ Inha Univ.
description: Distributed and Networked Systems Lab. (DNSLab) of the Department of Computer Engineering, Inha University located in the Incheon Metropolitan City, Republic of Korea is established by Prof. Heejun Roh on March 1, 2024. Currently, our research activities include (1) Network Telemetry including network traffic monitoring and classification, (2) Radio Frequency (RF)-powered computing and networking systems, (3) RF sensing and wireless coexistence, and (4) design, implementation, and analysis of various network protocols and networked systems. If you are interested in our lab, please e-mail to hjroh _at_ inha _dot_ ac _dot_ kr.